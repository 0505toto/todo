<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectHub - Your Ultimate Project Management Tool</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="app-container">

        <nav id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-cubes"></i> ProjectHub</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" class="active"><i class="fas fa-tachometer-alt"></i> ダッシュボード</a></li>
                <li><a href="#"><i class="fas fa-tasks"></i> マイタスク</a></li>
                <li><a href="#"><i class="fas fa-inbox"></i> 受信トレイ <span class="notification-badge">3</span></a></li>
                <li><a href="#"><i class="fas fa-calendar-alt"></i> カレンダー</a></li>
                <li><a href="#"><i class="fas fa-chart-bar"></i> レポート</a></li>
            </ul>
            <div class="sidebar-projects">
                <h4><i class="fas fa-folder"></i> プロジェクト</h4>
                <ul>
                    <li><a href="#"><span class="project-color-dot blue"></span> 新ウェブサイト開発</a></li>
                    <li><a href="#"><span class="project-color-dot green"></span> 2025年Q3マーケティング</a></li>
                    <li><a href="#"><span class="project-color-dot orange"></span> モバイルアプリ v2.0</a></li>
                    <li><button class="add-project-btn"><i class="fas fa-plus"></i> 新規プロジェクト</button></li>
                </ul>
            </div>
        </nav>

        <div id="main-content">

            <header id="main-header">
                <div class="header-left">
                    <button id="sidebar-toggle"><i class="fas fa-bars"></i></button>
                    <h2>新ウェブサイト開発</h2>
                </div>
                <div class="header-right">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="タスクを検索...">
                    </div>
                    <button class="action-btn"><i class="fas fa-share-alt"></i> 共有</button>
                    <button class="action-btn primary"><i class="fas fa-plus"></i> タスクを追加</button>
                    <div class="user-menu">
                        <img src="https://i.pravatar.cc/40" alt="User Avatar" class="user-avatar">
                        </div>
                </div>
            </header>

            <main id="app-view">
                <div class="kanban-board">
                    <div class="kanban-list">
                        <h3 class="list-title">ToDo <span class="task-count">4</span></h3>
                        <div class="list-cards">
                            <article class="kanban-card">
                                <h4>サイトの基本設計を完了させる</h4>
                                <div class="card-meta">
                                    <span class="due-date"><i class="far fa-clock"></i> 6月30日</span>
                                    <span class="priority high">高</span>
                                </div>
                                <div class="card-assignees">
                                    <img src="https://i.pravatar.cc/24?u=a" alt="User Avatar">
                                </div>
                            </article>
                            <article class="kanban-card">
                                <h4>ロゴデザインのドラフト作成</h4>
                                <div class="card-meta">
                                    <span class="due-date"><i class="far fa-clock"></i> 7月2日</span>
                                    <span class="priority medium">中</span>
                                </div>
                                <div class="card-assignees">
                                     <img src="https://i.pravatar.cc/24?u=b" alt="User Avatar">
                                     <img src="https://i.pravatar.cc/24?u=c" alt="User Avatar">
                                </div>
                            </article>
                        </div>
                        <button class="add-card-btn"><i class="fas fa-plus"></i> カードを追加</button>
                    </div>

                    <div class="kanban-list">
                        <h3 class="list-title">In Progress <span class="task-count">2</span></h3>
                         <div class="list-cards"></div>
                        <button class="add-card-btn"><i class="fas fa-plus"></i> カードを追加</button>
                    </div>

                    <div class="kanban-list">
                        <h3 class="list-title">Done <span class="task-count">1</span></h3>
                         <div class="list-cards"></div>
                        <button class="add-card-btn"><i class="fas fa-plus"></i> カードを追加</button>
                    </div>

                    <div class="add-new-list">
                        <button><i class="fas fa-plus"></i> 新しいリストを追加</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="modal-container" class="hidden">
        <div class="modal-content">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
