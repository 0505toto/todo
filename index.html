<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部内スケジュール管理ポータル</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>部内スケジュール管理</h1>
    </header>

    <main>
        <section id="reminder-section">
            <h2><span class="icon">🔔</span> 近日中の予定リマインダー</h2>
            <div id="reminders-list">
                </div>
        </section>

        <section id="schedule-form-section">
            <h2><span class="icon">📅</span> 新しい予定を追加</h2>
            <form id="schedule-form">
                <div class="form-group">
                    <label for="member">担当者</label>
                    <select id="member" name="member" multiple>
                        <option value="西田">西田</option>
                        <option value="髙原">髙原</option>
                        <option value="中尾">中尾</option>
                    </select>
                    <small>複数人選択可 (Ctrlキー or Commandキーを押しながらクリック)</small>
                </div>

                <div class="form-group">
                    <label for="title">予定内容</label>
                    <input type="text" id="title" name="title" required placeholder="例：〇〇プロジェクト定例会議">
                </div>

                <div class="form-group">
                    <label for="date">日付</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group inline-group">
                    <input type="time" id="time" name="time">
                    <input type="checkbox" id="all-day" name="all-day">
                    <label for="all-day">終日</label>
                </div>

                <div class="form-group">
                    <label for="repeat-type">繰り返し設定</label>
                    <select id="repeat-type" name="repeat-type">
                        <option value="none">なし</option>
                        <option value="weekly">毎週</option>
                        <option value="monthly">毎月</option>
                    </select>
                </div>
                
                <div id="repeat-options" class="hidden">
                    <div id="weekly-options" class="hidden">
                        <label>曜日を選択</label>
                        <div>
                            <input type="checkbox" id="weekday-sun" name="weekday" value="0"><label for="weekday-sun">日</label>
                            <input type="checkbox" id="weekday-mon" name="weekday" value="1"><label for="weekday-mon">月</label>
                            <input type="checkbox" id="weekday-tue" name="weekday" value="2"><label for="weekday-tue">火</label>
                            <input type="checkbox" id="weekday-wed" name="weekday" value="3"><label for="weekday-wed">水</label>
                            <input type="checkbox" id="weekday-thu" name="weekday" value="4"><label for="weekday-thu">木</label>
                            <input type="checkbox" id="weekday-fri" name="weekday" value="5"><label for="weekday-fri">金</label>
                            <input type="checkbox" id="weekday-sat" name="weekday" value="6"><label for="weekday-sat">土</label>
                        </div>
                    </div>
                    <div id="monthly-options" class="hidden">
                        <label for="monthly-day">毎月何日？</label>
                        <input type="number" id="monthly-day" name="monthly-day" min="1" max="31"> 日
                    </div>
                    <div class="form-group">
                        <label for="holiday-handling">休日が重なった場合</label>
                        <select id="holiday-handling" name="holiday-handling">
                            <option value="after">後ろの営業日にずらす</option>
                            <option value="before">前の営業日にずらす</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">分類（カテゴリ）</label>
                    <input type="text" id="category" name="category" placeholder="例：会議、訪問、社内業務など">
                </div>

                <button type="submit" class="submit-btn">予定を登録する</button>
            </form>
        </section>

        <section id="schedule-display-section">
            <h2><span class="icon">📋</span> スケジュール一覧</h2>
            <div id="schedule-list">
                </div>
        </section>

        <section id="holiday-settings-section">
            <h2><span class="icon">⚙️</span> 休日設定</h2>
            <p>土日祝日以外の休日（夏季休暇など）を追加できます。</p>
            <form id="holiday-form">
                <div class="form-group">
                    <label for="custom-holiday">日付を選択</label>
                    <input type="date" id="custom-holiday" name="custom-holiday">
                    <button type="submit">休日として追加</button>
                </div>
            </form>
            <h3>特別休日リスト</h3>
            <ul id="holiday-list">
                </ul>
        </section>

    </main>

    <footer>
        <p>&copy; 2025 部内スケジュール管理</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
